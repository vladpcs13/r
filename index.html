<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Нажмите чтобы закрыть</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      color: white;
      font-size: 5vw;
      transition: background 0.5s ease;
      position: relative;
    }

    #text {
      z-index: 2;
    }

    #gif {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="text">НАЖМИТЕ ЧТОБЫ ЗАКРЫТЬ</div>
    <img id="gif" src="gif.gif">
  </div>

  <script>
    let started = false;
    let audio;

    async function start() {
      if (started) return;
      started = true;

      const container = document.getElementById('container');
      const text = document.getElementById('text');
      const gif = document.getElementById('gif');

      // Пытаемся fullscreen через контейнер
      if (container.requestFullscreen) {
        try { await container.requestFullscreen(); } catch(e) {}
      }

      // Фон плавно меняем на белый
      container.style.background = "white";

      // Скрываем текст
      text.style.display = "none";

      // Показываем GIF
      gif.style.display = "block";
      requestAnimationFrame(() => {
        gif.style.opacity = "1";
      });

      // Создаем и запускаем аудио
      audio = new Audio('snd.mp3');
      audio.loop = true;
      audio.play().catch(err => console.log("Ошибка воспроизведения звука:", err));
    }

    document.addEventListener("click", start);
    document.addEventListener("touchend", start);
  </script>
</body>
</html>
