<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>НАЖМИТЕ ЧТОБЫ ЗАКРЫТЬ</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-family: Arial, sans-serif;
      color: white;
      font-size: 5vw;
      transition: background 0.1s linear;
    }

    #gif {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 100vh;
      display: none;
      transform: translate(-50%, -50%);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="text">НАЖМИТЕ ЧТОБЫ ЗАКРЫТЬ</div>

  <img id="gif" src="gif.gif">

  <audio id="snd" src="snd.mp3" loop></audio>

  <script>
    let started = false;

    async function start() {
      if (started) return;
      started = true;


      if (!document.fullscreenElement) {
        try { 
          await document.documentElement.requestFullscreen(); 
        } catch(e) {}
      }


      document.body.style.background = "white";


      document.getElementById("text").style.display = "none";


      const gif = document.getElementById("gif");
      gif.style.display = "block";


      const audio = document.getElementById("snd");
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    document.addEventListener("click", start);
    document.addEventListener("touchstart", start);
  </script>
</body>
</html>
